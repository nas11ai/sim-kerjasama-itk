name: CI

on:
    pull_request:
        branches: [main, staging, dev]
    push:
        branches: [main, staging, dev]

jobs:
    backend:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_DB: simpas_test
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports: ['5432:5432']

            dragonfly:
                image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.27.1
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5
                ports: ['6379:6379']

        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.3'
                  extensions: pdo_pgsql, redis

            - name: Cache Composer
              uses: actions/cache@v4
              with:
                  path: vendor
                  key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

            - name: Install Dependencies
              run: composer install --no-interaction --prefer-dist

            - name: Copy .env
              run: |
                  cp .env.example .env
                  php artisan key:generate
              env:
                  DB_CONNECTION: pgsql
                  DB_HOST: localhost
                  DB_PORT: 5432
                  DB_DATABASE: simpas_test
                  DB_USERNAME: postgres
                  DB_PASSWORD: postgres
                  REDIS_HOST: localhost
                  REDIS_PORT: 6379
                  FILESYSTEM_DISK: local

            - name: Migrate
              run: php artisan migrate --force
              env:
                  DB_CONNECTION: pgsql
                  DB_HOST: localhost
                  DB_PORT: 5432
                  DB_DATABASE: simpas_test
                  DB_USERNAME: postgres
                  DB_PASSWORD: postgres

            - name: Pint
              run: ./vendor/bin/pint --test

            - name: Larastan
              run: ./vendor/bin/phpstan analyse --memory-limit=512M

            - name: Pest
              run: ./vendor/bin/pest
              env:
                  DB_CONNECTION: pgsql
                  DB_HOST: localhost
                  DB_PORT: 5432
                  DB_DATABASE: simpas_test
                  DB_USERNAME: postgres
                  DB_PASSWORD: postgres
                  REDIS_HOST: localhost
                  REDIS_PORT: 6379
                  FILESYSTEM_DISK: local

    frontend:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'

            - name: Cache NPM
              uses: actions/cache@v4
              with:
                  path: node_modules
                  key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}

            - name: Install Dependencies
              run: npm ci

            - name: ESLint
              run: npm run lint

            - name: Prettier
              run: npm run format:check

            - name: Vitest
              run: npm run test

            - name: Build
              run: npm run build
