name: Branch Name Validation

on:
    pull_request:
    push:

jobs:
    validate-branch:
        runs-on: ubuntu-latest

        steps:
            - name: Validate branch name
              run: |
                  BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"

                  echo "Branch: $BRANCH"

                  if [[ "$BRANCH" =~ ^(main|staging|dev)$ ]]; then
                    exit 0
                  fi

                  if [[ "$BRANCH" =~ ^(main|staging|dev|task|feature|fix|chore|docs)\/[a-z0-9]([a-z0-9-]*[a-z0-9])?$ ]]; then
                    exit 0
                  fi

                  echo "Invalid branch name"
                  exit 1
