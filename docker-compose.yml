services:
  # ─────────────────────────────────────────
  # PostgreSQL — Primary Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: simpas_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-simpas}
      POSTGRES_USER: ${DB_USERNAME:-simpas}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-simpas} -d ${DB_DATABASE:-simpas}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Dragonfly — Redis-compatible Cache & Queue
  # ─────────────────────────────────────────
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: simpas_dragonfly
    restart: unless-stopped
    ulimits:
      memlock: -1
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - dragonfly_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MinIO — S3-compatible Local File Storage
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: simpas_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"       # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  dragonfly_data:
    driver: local
  minio_data:
    driver: local
